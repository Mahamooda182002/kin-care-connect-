name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (with detailed logging)
        id: build_apk
        run: |
          flutter build apk --release --verbose > build_log.txt 2>&1 || export EXIT_CODE=$?
          if [ -n "$EXIT_CODE" ] && [ "$EXIT_CODE" -ne 0 ]; then
             echo "FLUTTER BUILD FAILED."
             echo "### ❌ Flutter Build Failed" >> $GITHUB_STEP_SUMMARY
             tail -n 150 build_log.txt >> $GITHUB_STEP_SUMMARY
             
             # Push log to the repo so AI assistant can read it directly!
             mkdir -p error_logs
             cp build_log.txt error_logs/latest_build_log.txt
             
             git config --global user.name 'github-actions[bot]'
             git config --global user.email 'github-actions[bot]@users.noreply.github.com'
             git add error_logs/latest_build_log.txt
             git commit -m "chore: upload build log for debugging"
             git push
             
             exit $EXIT_CODE
          fi

      - name: Upload Build Log Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-logs
          path: build_log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
