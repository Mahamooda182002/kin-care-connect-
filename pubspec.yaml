name: kin_care_connect
description: Kin Care Connect - Family Elder Care App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  
  # AI
  google_generative_ai: ^0.4.6
  
  # Sensors & Background
  sensors_plus: ^5.0.1
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  
  # Audio - PINNED to exact working version
  record: 5.0.4
  path_provider: ^2.1.4
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Permissions
  permission_handler: ^11.3.1
  
  # UI
  syncfusion_flutter_gauges: ^27.1.48
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
