name: kin_care_connect
description: Kin Care Connect - Family Elder Care App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  
  # AI
  google_generative_ai: ^0.4.6
  
  # Sensors
  sensors_plus: ^5.0.1
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Speech
  speech_to_text: ^7.0.0
  
  # Permissions
  permission_handler: ^11.3.1
  
  # UI
  cupertino_icons: ^1.0.8
  glassmorphism: ^3.0.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
