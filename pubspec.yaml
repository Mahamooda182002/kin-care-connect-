name: kin_care_connect
description: A high-end, modern, mobile-first app with Instagram-like smoothness.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.1.0
  sensors_plus: ^4.0.2
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  provider: ^6.1.1
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  speech_to_text: ^6.5.1
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
